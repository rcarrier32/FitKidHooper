<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="ball"><circle cx="50" cy="50" r="43"/></clipPath>
    <radialGradient id="shine" cx="38%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="#0f1e35"/>
  <!-- Basketball -->
  <circle cx="50" cy="50" r="43" fill="#f97316"/>
  <!-- Seams (clipped to ball) -->
  <g clip-path="url(#ball)" stroke="#1a0500" stroke-width="3.8" fill="none" stroke-linecap="round">
    <line x1="7" y1="50" x2="93" y2="50"/>
    <line x1="50" y1="7" x2="50" y2="93"/>
    <path d="M50 7 Q14 50 50 93"/>
    <path d="M50 7 Q86 50 50 93"/>
  </g>
  <!-- Ball edge -->
  <circle cx="50" cy="50" r="43" fill="none" stroke="#1a0500" stroke-width="2"/>
  <!-- Highlight -->
  <circle cx="50" cy="50" r="43" fill="url(#shine)"/>
</svg>
