<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/FitKidHooper/favicon.svg" />
    <link rel="apple-touch-icon" href="/FitKidHooper/pwa-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FKH" />
    <meta name="theme-color" content="#060b14" />
    <title>Fit Kid Hooper</title>
  </head>
  <body>
    <div id="fkh-boot-shell" style="min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#060b14;color:#94a3b8;font-family:system-ui,sans-serif;gap:12px;padding:24px;text-align:center">
      <div style="font-size:40px;line-height:1">🏀</div>
      <div style="font-size:15px;font-weight:700;color:#f97316">Fit Kid Hooper</div>
      <div style="font-size:13px;opacity:0.85">Loading your training…</div>
    </div>
    <div id="root"></div>
    <script>
      (function () {
        var OBJECT_KEYS = [
          's_settings', 's_done', 'fkh-programs', 'fkh-program-progress', 'fkh-set-log',
          'fkh-max-reps', 'fkh-bilateral-prefs', 'fkh-missions', 'fkh-favs', 'fkh-badge-dates',
          'fkh-achievements', 'fkh-benchmark-pbs', 'fkh-notify-prefs', 'shot_log_v2'
        ];
        function favsFallback() { return '{"exercises":{},"workouts":{},"programs":{}}'; }
        function repairKey(k) {
          try {
            var raw = localStorage.getItem(k);
            if (raw == null) return;
            if (raw === 'null' || raw === '[]') {
              localStorage.setItem(k, k === 'fkh-favs' ? favsFallback() : '{}');
              return;
            }
            var v = JSON.parse(raw);
            if (v === null || typeof v !== 'object' || Array.isArray(v)) {
              localStorage.setItem(k, k === 'fkh-favs' ? favsFallback() : '{}');
            }
          } catch (e) {}
        }
        for (var i = 0; i < OBJECT_KEYS.length; i++) repairKey(OBJECT_KEYS[i]);
        try {
          var settingsRaw = localStorage.getItem('s_settings');
          if (settingsRaw && settingsRaw.length > 500000) {
            localStorage.removeItem('s_settings');
          } else if (settingsRaw && settingsRaw.indexOf('"avatar"') !== -1 && settingsRaw.length > 8000) {
            var stripped = settingsRaw
              .replace(/,"avatar":"data:[^"\\]*(?:\\.[^"\\]*)*"/, '')
              .replace(/"avatar":"data:[^"\\]*(?:\\.[^"\\]*)*",/, '');
            if (stripped !== settingsRaw) localStorage.setItem('s_settings', stripped);
          }
        } catch (e) {}
        try {
          var av = localStorage.getItem('fkh-avatar');
          if (av && av.length > 400000) localStorage.removeItem('fkh-avatar');
        } catch (e) {}
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistration().then(function (r) { if (r) r.update(); });
        }
      })();
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window._installPrompt = e;
        window.dispatchEvent(new Event('installpromptready'));
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
